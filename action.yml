# SPARDA — behavior proof + PR review from the compiled graph. 100% local,
# deterministic, no keys. Three modes:
#
#   mode: apocalypse (default) — prove the deploy, fail the job on any
#   critical/high finding. Optionally upload SARIF to the Security tab.
#     - uses: zyx77550/sparda@main
#       with: { sarif: 'true' }
#
#   mode: review — comment the BEHAVIOR diff of the PR (which endpoints changed,
#   whose blast radius grew, which guard/invariant it dropped) as ONE sticky
#   comment that updates on every push. Comment-only by default (never blocks a
#   merge); opt into gating with fail-on-severity.
#     on: pull_request
#     permissions: { contents: read, pull-requests: write }
#     - uses: actions/checkout@v4
#       with: { fetch-depth: 0 }
#     - uses: zyx77550/sparda@main
#       with: { mode: 'review' }
#
#   mode: prove — comment the trust verdict + badge on the PR.
#     - uses: zyx77550/sparda@main
#       with: { mode: 'prove' }
name: 'SPARDA'
description: "The trust layer for AI-written code — prove a deploy, diff a PR's behavior, gate an AI edit. 100% local, deterministic, no keys."
author: 'Residual Labs'
branding:
  icon: 'shield'
  color: 'red'

inputs:
  mode:
    description: "'apocalypse' (prove the deploy, default), 'review' (comment the PR behavior diff), or 'prove' (comment the trust verdict + badge)"
    required: false
    default: 'apocalypse'
  working-directory:
    description: 'Directory of the app (where package.json lives)'
    required: false
    default: '.'
  version:
    description: 'sparda-mcp version to run (npm dist-tag or semver)'
    required: false
    default: 'latest'
  # --- apocalypse mode ---
  sarif:
    description: 'apocalypse: also emit .sparda/apocalypse.sarif and upload it to code scanning'
    required: false
    default: 'false'
  # --- review mode ---
  base-ref:
    description: 'review: base git ref to diff against (default: the PR base branch)'
    required: false
    default: ''
  comment:
    description: 'review: post/update a sticky PR comment with the behavior diff'
    required: false
    default: 'true'
  fail-on-severity:
    description: "review: fail the check on findings — 'none' (default, comment-only), 'high', or 'critical'"
    required: false
    default: 'none'

runs:
  using: 'composite'
  steps:
    - name: Prove the deploy (apocalypse)
      if: ${{ inputs.mode == 'apocalypse' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ "${{ inputs.sarif }}" = "true" ]; then
          npx --yes sparda-mcp@${{ inputs.version }} apocalypse --sarif
        else
          npx --yes sparda-mcp@${{ inputs.version }} apocalypse
        fi

    - name: Upload SARIF to code scanning
      if: ${{ inputs.mode == 'apocalypse' && inputs.sarif == 'true' && always() }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ inputs.working-directory }}/.sparda/apocalypse.sarif
        category: sparda-apocalypse

    - name: Comment the trust verdict + badge (prove)
      if: ${{ inputs.mode == 'prove' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        BODY="${RUNNER_TEMP:-/tmp}/sparda-prove.md"
        set +e
        npx --yes sparda-mcp@${{ inputs.version }} prove --markdown > "$BODY"
        RC=$?
        set -e
        cat "$BODY" || true
        if [ "${{ inputs.comment }}" = "true" ] && [ -s "$BODY" ]; then
          SPARDA_REVIEW_BODY_FILE="$BODY" node "${{ github.action_path }}/.github/sparda-pr-comment.mjs" || true
        fi
        case "${{ inputs.fail-on-severity }}" in
          none) exit 0 ;;                 # comment-only: never block the merge
          *) exit $RC ;;                  # gate: prove exits 1 on critical/high
        esac

    - name: Review the PR behavior diff
      if: ${{ inputs.mode == 'review' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        set -e
        BASE="${{ inputs.base-ref }}"
        if [ -z "$BASE" ]; then
          # the PR's target branch — fetch its tip so the base can be compiled
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}" || true
          BASE="origin/${{ github.base_ref }}"
        fi
        BODY="${RUNNER_TEMP:-/tmp}/sparda-review.md"
        set +e
        npx --yes sparda-mcp@${{ inputs.version }} review --base "$BASE" --markdown > "$BODY"
        RC=$?
        set -e
        cat "$BODY" || true
        if [ "${{ inputs.comment }}" = "true" ] && [ -s "$BODY" ]; then
          SPARDA_REVIEW_BODY_FILE="$BODY" node "${{ github.action_path }}/.github/sparda-pr-comment.mjs" || true
        fi
        case "${{ inputs.fail-on-severity }}" in
          none) exit 0 ;;                 # comment-only: never block the merge
          *) exit $RC ;;                  # gate: review exits 1 on critical/high
        esac
